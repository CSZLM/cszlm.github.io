<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            margin: 20px 0;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        #comments {
            margin-top: 40px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }
        #commentForm {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #commentForm label {
            margin-bottom: 5px;
        }
        #commentForm input, #commentForm textarea {
            width: 100%;
            margin-bottom: 10px;
        }
        #commentList {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的网页</h1>
    </header>
    <main>
        <!-- 在这里插入用户注册和登录表单 -->
        <div id="userSection">
            <h2>用户注册</h2>
            <form id="registerForm">
                <label for="regUsername">用户名：</label>
                <input type="text" id="regUsername" required><br>
                <label for="regPassword">密码：</label>
                <input type="password" id="regPassword" required><br>
                <label for="regAvatar">头像：</label>
                <input type="file" id="regAvatar" accept="image/*"><br>
                <button type="submit">注册</button>
            </form>
            <h2>用户登录</h2>
            <form id="loginForm">
                <label for="loginUsername">用户名：</label>
                <input type="text" id="loginUsername" required><br>
                <label for="loginPassword">密码：</label>
                <input type="password" id="loginPassword" required><br>
                <button type="submit">登录</button>
            </form>
        </div>
        <!-- 评论区域 -->
        <div id="comments">
            <h2>评论区域</h2>
            <form id="commentForm">
                <label for="name">姓名：</label>
                <input type="text" id="name" required>
                <br>
                <label for="comment">评论：</label>
                <textarea id="comment" rows="4" cols="50" required></textarea>
                <br>
                <button type="submit">提交评论</button>
            </form>
            <div id="commentList"></div>
        </div>
    </main>
    <footer>版权所有 &copy; 2023 我的网站</footer>
    <script>
        document.getElementById('commentForm').addEventListener('submit', function(event) {
            event.preventDefault();
            var name = document.getElementById('name').value;
            var comment = document.getElementById('comment').value;
            var commentList = document.getElementById('commentList');
            var newComment = document.createElement('p');
            newComment.innerHTML = '<strong>' + name + '</strong>: ' + comment;
            commentList.appendChild(newComment);
            document.getElementById('name').value = '';
            document.getElementById('comment').value = '';
        });
    </script>
</body>
</html>
