    <div class="beijing">

                </div>
                <input type="text" placeholder="手机号码" class="in2">
            </div>

            <input type="text" class="in4" placeholder="验证码">
            <input type="submit" class="in5" value="发送验证码">

            <input type="radio" class="radio">
            <p class="main_p3">
                我已经阅读并同意
