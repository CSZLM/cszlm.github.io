<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的简单网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em;
        }

        main {
            width: 80%;
            margin: 2em auto;
            padding: 1em;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
        }

        p {
            font-size: 1em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的网站</h1>
    </header>
    <main>
        <h1>关于我</h1>
        <p>你好，我是张三，一名软件工程师。我喜欢编程，尤其是Web开发。这个网站是我用来展示我的技能和作品的地方。</p>
        <h1>联系方式</h1>
        <p>如果你对我的工作感兴趣，可以通过以下方式联系我：</p>
        <ul>
            <li>电子邮件：zhangsan@example.com</li>
            <li>电话：+86 1234567890</li>
        </ul>
    </main>
</body>
</html>
